<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firelog UI</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f8f9fa">
</head>
<body>
<header>
    <div class="header-left">
        <h1>🔥 Firelog UI</h1>
        <div class="filter-wrapper">
            <label for="execution-filter">Invocation instance:</label>
            <select id="execution-filter">
                <option value="all">All Invocations / Paths</option>
            </select>
        </div>
    </div>
    <button id="clear-btn">Clear Console</button>
</header>

<div id="log-container"></div>
<button id="scroll-bottom-btn" class="fab-btn">↓ Scroll to Bottom</button>

<script src="/client.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
